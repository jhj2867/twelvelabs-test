name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          TWELVELABS_API_KEY: ${{ secrets.TWELVELABS_API_KEY }}
          TWELVELABS_INDEX_ID: ${{ secrets.TWELVELABS_INDEX_ID }}
        run: pytest