name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          TWELVELABS_API_KEY: ${{ secrets.TWELVELABS_API_KEY }}
          TWELVELABS_INDEX_ID: ${{ secrets.TWELVELABS_INDEX_ID }}
        run: pytest --junitxml=report.xml --alluredir=allure-results

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: report.xml
          reporter: java-junit

      - name: Install Allure CLI
        if: always()
        run: |
          wget -qO allure.tgz https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy Allure history
        if: always()
        run: |
          mkdir -p allure-results/history
          if [ -d gh-pages/allure/history ]; then
            cp -r gh-pages/allure/history/. allure-results/history/
          fi

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results -o allure-report --clean

      - name: Prepare deploy directory
        if: always()
        run: |
          mkdir -p deploy/allure
          cp -r docs/. deploy/
          cp -r allure-report/. deploy/allure/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: deploy
          enable_jekyll: true
